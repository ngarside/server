version: 1
metadata:
  name: Custom - Outline
entries:

  # Scope - Email
  - id: custom-outline-scopes-email
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      scope_name: email

  # Scope - Offline Access
  - id: custom-outline-scopes-offline_access
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      scope_name: offline_access

  # Scope - OpenID
  - id: custom-outline-scopes-openid
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      scope_name: openid

  # Scope - Profile
  - id: custom-outline-scopes-profile
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      scope_name: profile

  # Provider - OIDC
  - id: custom-outline-oidc-provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      client_id: outline
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      client_secret: !File /run/secrets/outline_oidc_secret
      client_type: confidential
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      name: Outline Provider - OIDC
      property_mappings:
        - !KeyOf custom-outline-scopes-email
        - !KeyOf custom-outline-scopes-offline_access
        - !KeyOf custom-outline-scopes-openid
        - !KeyOf custom-outline-scopes-profile
      redirect_uris:
        - matching_mode: strict
          url: !Format [https://outline.%s/auth/oidc.callback, !File /run/secrets/machine_domain_root]

  # Provider - Proxy
  - id: custom-outline-proxy-provider
    model: authentik_providers_proxy.proxyprovider
    identifiers:
      external_host: !Format [https://outline.%s, !File /run/secrets/machine_domain_root]
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      client_type: confidential
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      mode: forward_single
      name: Outline Provider - Proxy

  # Application - OIDC
  - id: custom-outline-oidc-application
    model: authentik_core.application
    identifiers:
      slug: outline
    attrs:
      icon: outline.png
      name: Outline
      provider: !KeyOf custom-outline-oidc-provider

  # Application - Proxy
  - id: custom-outline-proxy-application
    model: authentik_core.application
    identifiers:
      slug: outline-proxy
    attrs:
      icon: outline.png
      meta_launch_url: blank://blank
      name: Outline - Proxy
      provider: !KeyOf custom-outline-proxy-provider

  # Group
  - id: custom-outline-group
    model: authentik_core.group
    identifiers:
      name: Outline Group

  # Binding - OIDC
  - id: custom-outline-oidc-binding
    model: authentik_policies.policybinding
    identifiers:
      group: !KeyOf custom-outline-group
      order: 0
      target: !KeyOf custom-outline-oidc-application

  # Binding - Proxy
  - id: custom-outline-proxy-binding
    model: authentik_policies.policybinding
    identifiers:
      group: !KeyOf custom-outline-group
      order: 0
      target: !KeyOf custom-outline-proxy-application
