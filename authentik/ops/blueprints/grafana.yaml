version: 1
metadata:
  name: Custom - Grafana
entries:

  # Scope - Email
  - id: custom-grafana-scopes-email
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      scope_name: email

  # Scope - OpenID
  - id: custom-grafana-scopes-openid
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      scope_name: openid

  # Scope - Profile
  - id: custom-grafana-scopes-profile
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      scope_name: profile

  # Provider - OIDC
  - id: custom-grafana-oidc-provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      client_id: grafana
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      client_secret: !File /run/secrets/grafana_oidc_secret
      client_type: confidential
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      logout_method: frontchannel
      logout_uri: !Format [https://grafana.%s/logout, !File /run/secrets/machine_domain_root]
      name: Grafana Provider
      property_mappings:
        - !KeyOf custom-grafana-scopes-email
        - !KeyOf custom-grafana-scopes-openid
        - !KeyOf custom-grafana-scopes-profile
      redirect_uris:
        - matching_mode: strict
          url: !Format [https://grafana.%s/login/generic_oauth, !File /run/secrets/machine_domain_root]

  # Provider - Proxy
  - id: custom-grafana-proxy-provider
    model: authentik_providers_proxy.proxyprovider
    identifiers:
      external_host: !Format [https://grafana.%s, !File /run/secrets/machine_domain_root]
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      client_type: confidential
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      mode: forward_single
      name: Grafana Provider - Proxy

  # Application - OIDC
  - id: custom-grafana-oidc-application
    model: authentik_core.application
    identifiers:
      slug: grafana
    attrs:
      icon: grafana.png
      name: Grafana
      provider: !KeyOf custom-grafana-oidc-provider

  # Application - Proxy
  - id: custom-grafana-proxy-application
    model: authentik_core.application
    identifiers:
      slug: grafana-proxy
    attrs:
      icon: grafana.png
      meta_launch_url: blank://blank
      name: Grafana - Proxy
      provider: !KeyOf custom-grafana-proxy-provider

  # Group - Admins
  - id: custom-grafana-group-admins
    model: authentik_core.group
    identifiers:
      name: Grafana Admins

  # Group - Editors
  - id: custom-grafana-group-editors
    model: authentik_core.group
    identifiers:
      name: Grafana Editors

  # Group - Viewers
  - id: custom-grafana-group-viewers
    model: authentik_core.group
    identifiers:
      name: Grafana Viewers

  # Binding - OIDC - Admins
  - id: custom-grafana-binding-oidc-admins
    model: authentik_policies.policybinding
    identifiers:
      group: !KeyOf custom-grafana-group-admins
      order: 0
      target: !KeyOf custom-grafana-oidc-application

  # Binding - Proxy - Admins
  - id: custom-grafana-binding-proxy-admins
    model: authentik_policies.policybinding
    identifiers:
      group: !KeyOf custom-grafana-group-admins
      order: 0
      target: !KeyOf custom-grafana-proxy-application

  # Binding - OIDC - Editors
  - id: custom-grafana-binding-oidc-editors
    model: authentik_policies.policybinding
    identifiers:
      group: !KeyOf custom-grafana-group-editors
      order: 0
      target: !KeyOf custom-grafana-oidc-application

  # Binding - Proxy - Editors
  - id: custom-grafana-binding-proxy-editors
    model: authentik_policies.policybinding
    identifiers:
      group: !KeyOf custom-grafana-group-editors
      order: 0
      target: !KeyOf custom-grafana-proxy-application

  # Binding - OIDC - Viewers
  - id: custom-grafana-binding-oidc-viewers
    model: authentik_policies.policybinding
    identifiers:
      group: !KeyOf custom-grafana-group-viewers
      order: 0
      target: !KeyOf custom-grafana-oidc-application

  # Binding - Proxy - Viewers
  - id: custom-grafana-binding-proxy-viewers
    model: authentik_policies.policybinding
    identifiers:
      group: !KeyOf custom-grafana-group-viewers
      order: 0
      target: !KeyOf custom-grafana-proxy-application
