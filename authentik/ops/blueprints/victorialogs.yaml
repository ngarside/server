version: 1
metadata:
  name: Custom - Victoria Logs
entries:

  # Provider
  - id: custom-victorialogs-provider
    model: authentik_providers_proxy.proxyprovider
    identifiers:
      external_host: !Format [https://victorialogs.%s, !File /run/secrets/machine_domain_root]
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      client_type: confidential
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      mode: forward_single
      name: Victoria Logs Provider

  # Application
  - id: custom-victorialogs-application
    model: authentik_core.application
    identifiers:
      slug: victorialogs
    attrs:
      icon: victorialogs.png
      name: Victoria Logs
      provider: !KeyOf custom-victorialogs-provider

  # Group
  - id: custom-victorialogs-group
    model: authentik_core.group
    identifiers:
      name: Victoria Logs Group

  # Binding
  - id: custom-victorialogs-binding
    model: authentik_policies.policybinding
    identifiers:
      group: !KeyOf custom-victorialogs-group
      order: 0
      target: !KeyOf custom-victorialogs-application
