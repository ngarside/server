version: 1
metadata:
  name: Custom - Memos
entries:

  # Scope - Email
  - id: custom-memos-scopes-email
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      scope_name: email

  # Scope - OpenID
  - id: custom-memos-scopes-openid
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      scope_name: openid

  # Scope - Profile
  - id: custom-memos-scopes-profile
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      scope_name: profile

  # Provider - OIDC
  - id: custom-memos-oidc-provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      client_id: memos
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      client_type: confidential
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      name: Memos Provider - OIDC
      property_mappings:
        - !KeyOf custom-memos-scopes-email
        - !KeyOf custom-memos-scopes-openid
        - !KeyOf custom-memos-scopes-profile
      redirect_uris:
        - matching_mode: strict
          url: !Format [https://memos.%s/auth/callback, !File /run/secrets/machine_domain_root]

  # Provider - Proxy
  - id: custom-memos-proxy-provider
    model: authentik_providers_proxy.proxyprovider
    identifiers:
      external_host: !Format [https://memos.%s, !File /run/secrets/machine_domain_root]
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      client_type: confidential
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      mode: forward_single
      name: Memos Provider - Proxy

  # Application - OIDC
  - id: custom-memos-oidc-application
    model: authentik_core.application
    identifiers:
      slug: memos
    attrs:
      icon: memos.png
      name: Memos
      provider: !KeyOf custom-memos-oidc-provider

  # Application - Proxy
  - id: custom-memos-proxy-application
    model: authentik_core.application
    identifiers:
      slug: memos-proxy
    attrs:
      icon: memos.png
      meta_launch_url: blank://blank
      name: Memos - Proxy
      provider: !KeyOf custom-memos-proxy-provider

  # Group
  - id: custom-memos-group
    model: authentik_core.group
    identifiers:
      name: Memos Group

  # Binding - OIDC
  - id: custom-memos-oidc-binding
    model: authentik_policies.policybinding
    identifiers:
      group: !KeyOf custom-memos-group
      order: 0
      target: !KeyOf custom-memos-oidc-application

  # Binding - Proxy
  - id: custom-memos-proxy-binding
    model: authentik_policies.policybinding
    identifiers:
      group: !KeyOf custom-memos-group
      order: 0
      target: !KeyOf custom-memos-proxy-application
