version: 1
metadata:
  name: Custom - Vaultwarden
entries:

  # Scope - Email
  - id: custom-vaultwarden-scopes-email
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      scope_name: email

  # Scope - OpenID
  - id: custom-vaultwarden-scopes-openid
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      scope_name: openid

  # Scope - Profile
  - id: custom-vaultwarden-scopes-profile
    model: authentik_providers_oauth2.scopemapping
    identifiers:
      scope_name: profile

  # Provider - OIDC
  - id: custom-vaultwarden-oidc-provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      client_id: vaultwarden
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      client_secret: !File /run/secrets/vaultwarden_oidc_secret
      client_type: confidential
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      name: Vaultwarden Provider - OIDC
      property_mappings:
        - !KeyOf custom-vaultwarden-scopes-email
        - !KeyOf custom-vaultwarden-scopes-openid
        - !KeyOf custom-vaultwarden-scopes-profile
      redirect_uris:
        - matching_mode: strict
          url: !Format [https://vaultwarden.%s/auth/oidc.callback, !File /run/secrets/machine_domain_root]

  # Provider - Proxy
  - id: custom-vaultwarden-proxy-provider
    model: authentik_providers_proxy.proxyprovider
    identifiers:
      external_host: !Format [https://vaultwarden.%s, !File /run/secrets/machine_domain_root]
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      client_type: confidential
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      mode: forward_single
      name: Vaultwarden Provider - Proxy

  # Application - OIDC
  - id: custom-vaultwarden-oidc-application
    model: authentik_core.application
    identifiers:
      slug: vaultwarden
    attrs:
      icon: vaultwarden.png
      name: Vaultwarden
      provider: !KeyOf custom-vaultwarden-oidc-provider

  # Application - Proxy
  - id: custom-vaultwarden-proxy-application
    model: authentik_core.application
    identifiers:
      slug: vaultwarden-proxy
    attrs:
      icon: vaultwarden.png
      meta_launch_url: blank://blank
      name: Vaultwarden - Proxy
      provider: !KeyOf custom-vaultwarden-proxy-provider

  # Group
  - id: custom-vaultwarden-group
    model: authentik_core.group
    identifiers:
      name: Vaultwarden Group

  # Binding - OIDC
  - id: custom-vaultwarden-oidc-binding
    model: authentik_policies.policybinding
    identifiers:
      group: !KeyOf custom-vaultwarden-group
      order: 0
      target: !KeyOf custom-vaultwarden-oidc-application

  # Binding - Proxy
  - id: custom-vaultwarden-proxy-binding
    model: authentik_policies.policybinding
    identifiers:
      group: !KeyOf custom-vaultwarden-group
      order: 0
      target: !KeyOf custom-vaultwarden-proxy-application
